<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrookesConnect - 增强版</title>
    
    <!-- 字体和图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 原有样式保持不变，新增密码强度、头像上传相关样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: white;
            max-width: 400px;
            margin: 50px auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 4rem;
            color: #667eea;
        }

        .logo h1 {
            font-size: 2rem;
            color: #333;
            margin-top: 10px;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab i {
            margin-right: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group label i {
            color: #667eea;
            margin-right: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input,
        .input-wrapper select,
        .input-wrapper textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .input-wrapper textarea {
            min-height: 100px;
            resize: vertical;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .input-wrapper textarea + i {
            top: 25px;
            transform: none;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus,
        .input-wrapper textarea:focus {
            border-color: #667eea;
            outline: none;
        }

        /* 密码强度条 */
        .password-strength {
            margin-top: 8px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            gap: 4px;
        }
        .strength-segment {
            flex: 1;
            height: 100%;
            transition: all 0.3s ease;
            background: #e0e0e0;
        }
        .strength-segment.weak { background: #ff4d4d; }
        .strength-segment.medium { background: #ffaa33; }
        .strength-segment.strong { background: #00cc66; }
        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            text-align: right;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-submit.small {
            width: auto;
            padding: 10px 20px;
            font-size: 0.9rem;
        }

        .message {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 5px solid #c33;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 5px solid #3c3;
        }

        .message.info {
            background: #e6f3ff;
            color: #2196F3;
            border-left: 5px solid #2196F3;
        }

        .user-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* 头像区域 - 可点击 */
        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }
        .user-avatar-large {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #667eea;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .user-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-edit-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #667eea;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            font-size: 0.8rem;
        }
        .user-info {
            flex: 1;
        }
        .user-info h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .user-info p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .logout-btn {
            margin-top: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 15px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .action-btn {
            background: #f8f9fa;
            border: none;
            padding: 20px 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn i {
            font-size: 1.8rem;
            color: #667eea;
        }

        .action-btn span {
            font-weight: 500;
            color: #333;
        }

        .action-btn small {
            font-size: 0.7rem;
            color: #666;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .student-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .student-header {
            display: flex;
            gap: 15px;
        }

        .student-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .student-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .student-details {
            flex: 1;
        }

        .student-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .student-year-badge {
            background: #e6f0ff;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .student-info {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .student-info i {
            width: 16px;
            margin-right: 5px;
        }

        .interest-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .interest-tag {
            background: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            border: 1px solid #e0e0e0;
        }

        .society-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .society-header {
            display: flex;
            gap: 15px;
        }

        .society-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .society-info {
            flex: 1;
        }

        .society-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .society-category-badge {
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }

        .society-description {
            color: #666;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        .society-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .join-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px;
        }

        .filter-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .match-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .match-score {
            background: #4CAF50;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .common-interests {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .connect-btn {
            margin-top: 15px;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .back-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        #initialLoading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* 隐藏的文件输入 */
        #avatarUploadInput {
            display: none;
        }

        /* 签名样式 */
        .signature-badge {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 12px;
            margin-top: 10px;
            font-style: italic;
            font-size: 0.9rem;
        }

        .signature-display {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            max-width: 300px;
            margin: 0 auto;
        }

        .character-count {
            display: flex;
            justify-content: flex-end;
            margin-top: 5px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="initialLoading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 20px;">Loading BrookesConnect...</p>
        <p id="dbStatus" style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">Initializing</p>
    </div>

    <!-- 主容器 -->
    <div class="scroll-container" id="mainContent" style="display: none;"></div>

    <!-- 消息提示容器 -->
    <div id="globalMessage" class="message" style="position: fixed; top: 20px; left: 20px; right: 20px; z-index: 10000; display: none;"></div>

    <!-- 隐藏的头像上传input -->
    <input type="file" id="avatarUploadInput" accept="image/*">

    <script>

                {

                    year: 2,
                    interests: ['Web Development', 'Mobile Apps', 'UI/UX'],
                    email: 'michael.brown@brookes.ac.uk',
                    avatar: null,
                    signature: 'Creating user-friendly experiences. Coffee addict.'
                }
            ],
            societies: [
                {

                {

                {

                    description: 'Learn and practice photography skills.',
                    members: 31,
                    meeting: 'Saturdays'
                }

        };

        // ==================== 全局变量 ====================
        let currentUser = null;
        let databaseStats = {
            students: mockData.students.length,
            societies: mockData.societies.length,
            matches: 156
        };

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            updateDBStatus('Checking login status...');
            
            // 检查登录状态
            checkLoginStatus();
            
            setTimeout(() => {
                document.getElementById('initialLoading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 1500);

            // 监听头像上传
            document.getElementById('avatarUploadInput').addEventListener('change', handleAvatarUpload);
        });

        // 更新数据库状态
        function updateDBStatus(message) {
            const statusEl = document.getElementById('dbStatus');
            if (statusEl) {
                statusEl.textContent = message;
            }
        }

        // 检查登录状态
        function checkLoginStatus() {
            const savedUser = localStorage.getItem('brookes_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainPage();
            } else {
                showLoginPage();
            }
        }

        // 显示消息
        function showMessage(text, type = 'info') {
            const msgEl = document.getElementById('globalMessage');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3000);
        }

        // ==================== 登录页面 ====================
        function showLoginPage() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="card login-card">
                    <div class="logo">
                        <i class="fas fa-university"></i>

                        <div class="tab" id="registerTab" onclick="switchTab('register')">

                        </div>
                    </div>

                    <!-- 登录表单 -->
                    <div id="loginForm">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>

                                <i class="fas fa-envelope"></i>

                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="loginPassword" placeholder="Enter your password">
                            </div>
                        </div>

                        <button class="btn-submit" onclick="handleLogin()">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </div>

                    <!-- 注册表单 (增强：二次密码、强度条、签名) -->
                    <div id="registerForm" style="display: none;">
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Brookes Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="regEmail" placeholder="your.name@brookes.ac.uk">
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nickname</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="regNickname" placeholder="How should we call you?">
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-building"></i> Faculty</label>
                            <div class="input-wrapper">
                                <i class="fas fa-building"></i>
                                <select id="regFaculty">
                                    <option value="">Select your faculty</option>
                                    <option value="Business School">Business School</option>
                                    <option value="Technology">Technology, Design and Environment</option>
                                    <option value="Health Sciences">Health and Life Sciences</option>
                                    <option value="Humanities">Humanities and Social Sciences</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-graduation-cap"></i> Level</label>
                            <div class="input-wrapper">
                                <i class="fas fa-graduation-cap"></i>
                                <select id="regLevel">
                                    <option value="">Select level</option>
                                    <option value="Foundation">Foundation</option>
                                    <option value="Undergraduate">Undergraduate</option>
                                    <option value="Postgraduate">Postgraduate</option>
                                    <option value="PhD">PhD</option>
                                </select>

        // 密码强度检测
        function checkPasswordStrength() {
            const pwd = document.getElementById('regPassword').value;
            const segments = document.querySelectorAll('#passwordStrengthBar .strength-segment');
            const strengthText = document.getElementById('strengthText');
            
            // 重置
            segments.forEach(s => s.className = 'strength-segment');
            
            if (!pwd) {
                strengthText.innerText = '请输入密码';
                return;
            }
            
            let strength = 0;
            // 长度至少6
            if (pwd.length >= 6) strength += 1;
            // 包含数字
            if (/\d/.test(pwd)) strength += 1;
            // 包含字母大小写或特殊字符
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd) || /[^a-zA-Z0-9]/.test(pwd)) strength += 1;
            
            // 更新条
            if (strength === 1) {
                segments[0].className = 'strength-segment weak';
                strengthText.innerText = '弱';
            } else if (strength === 2) {
                segments[0].className = 'strength-segment medium';
                segments[1].className = 'strength-segment medium';
                strengthText.innerText = '中等';
            } else if (strength >= 3) {
                segments.forEach(s => s.className = 'strength-segment strong');
                strengthText.innerText = '强';
            }
        }

        // 处理登录
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                currentUser = user;
                localStorage.setItem('brookes_user', JSON.stringify(user));
                showMessage('Login successful!', 'success');
                setTimeout(showMainPage, 1000);
            } else {
                showMessage('Invalid email or password', 'error');
            }
        }

        // 处理注册（带确认密码和签名）
        function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const nickname = document.getElementById('regNickname').value;
            const faculty = document.getElementById('regFaculty').value;
            const level = document.getElementById('regLevel').value;
            const major = document.getElementById('regMajor').value;
            const year = document.getElementById('regYear').value;
            const signature = document.getElementById('regSignature')?.value || '';
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!email || !nickname || !faculty || !level || !major || !year || !password || !confirm) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!email.endsWith('@brookes.ac.uk')) {
                showMessage('Please use your Brookes email', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            // 简单强度检查：至少6位
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            
            if (users.some(u => u.email === email)) {
                showMessage('Email already registered', 'error');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                email,
                nickname,
                faculty,
                level,
                major,
                year,
                signature,
                password,
                avatar: null
            };
            
            users.push(newUser);
            localStorage.setItem('brookes_users', JSON.stringify(users));
            
            currentUser = newUser;
            localStorage.setItem('brookes_user', JSON.stringify(newUser));
            
            showMessage('Registration successful!', 'success');
            setTimeout(showMainPage, 1000);
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 简单检查类型
            if (!file.type.startsWith('image/')) {
                showMessage('请选择图片文件', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const avatarDataUrl = e.target.result;
                // 更新 currentUser 和 localStorage
                if (currentUser) {
                    currentUser.avatar = avatarDataUrl;
                    localStorage.setItem('brookes_user', JSON.stringify(currentUser));
                    
                    // 同时更新 users 数组中的记录
                    const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
                    const index = users.findIndex(u => u.id === currentUser.id);
                    if (index !== -1) {
                        users[index].avatar = avatarDataUrl;
                        localStorage.setItem('brookes_users', JSON.stringify(users));
                    }
                    
                    showMessage('头像更新成功', 'success');
                    // 刷新当前页面
                    if (document.querySelector('.user-card')) {
                        showMainPage(); // 重新渲染主页
                    } else {
                        showProfile(); // 如果在个人资料页，也刷新
                    }
                }
            };
            reader.readAsDataURL(file);
            // 清空input以便再次选择同一文件
            event.target.value = '';
        }

            showMessage(`Connection request sent to ${name}!`, 'success');
        }

        // ==================== 个人资料页面（带签名编辑功能）====================
        function showProfile() {
            if (!currentUser) {
                showLoginPage();
                return;
            }
            
            const mainContent = document.getElementById('mainContent');
            const avatarHtml = currentUser.avatar 
                ? `<img src="${currentUser.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` 
                : `<i class="fas fa-user-graduate" style="font-size: 3rem; color: white;"></i>`;
            
            mainContent.innerHTML = `
                <div class="card">
                    <div class="back-header">
                        <h2><i class="fas fa-user" style="color: #667eea;"></i> My Profile</h2>
                        <button class="btn-submit small" onclick="showMainPage()">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                    </div>
                    
                    <!-- 头像 + 可点击更换 -->
                    <div style="text-align: center; margin-bottom: 30px;">
                        <div class="avatar-wrapper" style="display: inline-block;" onclick="triggerAvatarUpload()">
                            <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; overflow: hidden; border: 3px solid white;">
                                ${avatarHtml}
                            </div>
                            <div style="background: #667eea; color: white; border-radius: 20px; padding: 5px 15px; display: inline-block; font-size: 0.9rem; cursor: pointer;">
                                <i class="fas fa-camera"></i> 更换头像
                            </div>
                        </div>
                        <h3>${currentUser.nickname}</h3>
                        <p style="color: #666;">${currentUser.email}</p>
                        
                        <!-- 签名显示区域（非编辑模式） -->
                        <div id="signatureDisplay" style="margin-top: 15px; ${currentUser.signature ? '' : 'display: none;'}">
                            <div class="signature-display">
                                <i class="fas fa-quote-left" style="color: #667eea; opacity: 0.5;"></i>
                                <span id="signatureText" style="font-style: italic;">${currentUser.signature || ''}</span>
                                <i class="fas fa-quote-right" style="color: #667eea; opacity: 0.5;"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div style="background: #f8f9fa; border-radius: 15px; padding: 20px;">
                        <div style="display: grid; gap: 15px;">
                            <div>
                                <label style="color: #666; font-size: 0.9rem;">Faculty</label>
                                <p style="font-weight: 500;">${currentUser.faculty || 'Not specified'}</p>
                            </div>
                            <div>
                                <label style="color: #666; font-size: 0.9rem;">Degree Level</label>
                                <p style="font-weight: 500;">${currentUser.level || 'Undergraduate'}</p>
                            </div>
                            <div>
                                <label style="color: #666; font-size: 0.9rem;">Major</label>
                                <p style="font-weight: 500;">${currentUser.major || 'Not specified'}</p>
                            </div>
                            <div>
                                <label style="color: #666; font-size: 0.9rem;">Year of Study</label>
                                <p style="font-weight: 500;">Year ${currentUser.year || 1}</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 签名编辑区域 -->
                    <div style="margin-top: 20px; background: #f8f9fa; border-radius: 15px; padding: 20px;">
                        <h4 style="margin-bottom: 15px;">
                            <i class="fas fa-quote-right" style="color: #667eea;"></i> 
                            Personal Signature
                        </h4>
                        
                        <!-- 编辑模式（默认隐藏） -->
                        <div id="signatureEditMode" style="display: none;">
                            <div class="form-group">
                                <textarea id="editSignature" placeholder="Tell us something about yourself... (max 100 characters)" maxlength="100" style="width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 1rem; font-family: 'Poppins', sans-serif; resize: vertical;" rows="3" onkeyup="updateEditSignatureCount()">${currentUser.signature || ''}</textarea>
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                                    <span id="editSignatureCount" style="font-size: 0.8rem; color: #666;">${(currentUser.signature || '').length}/100</span>
                                    <div>
                                        <button class="btn-submit small" onclick="saveSignature()" style="margin-right: 10px; width: auto;">
                                            <i class="fas fa-save"></i> Save
                                        </button>
                                        <button class="btn-submit small" onclick="cancelEditSignature()" style="background: #999; width: auto;">
                                            <i class="fas fa-times"></i> Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 非编辑模式下的操作按钮 -->
                        <div id="signatureActions" style="text-align: center;">
                            <button class="btn-submit small" onclick="showEditSignature()" style="width: auto; padding: 10px 30px;">
                                <i class="fas fa-edit"></i> ${currentUser.signature ? 'Edit Signature' : 'Add Signature'}
                            </button>
                        </div>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <h4 style="margin-bottom: 10px;">Interests</h4>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <span class="interest-tag" style="background: #f0f0f0; padding: 8px 15px;">Coding</span>
                            <span class="interest-tag" style="background: #f0f0f0; padding: 8px 15px;">Music</span>
                            <span class="interest-tag" style="background: #f0f0f0; padding: 8px 15px;">Sports</span>
                            <span style="background: #667eea; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer;" onclick="addInterest()">
                                <i class="fas fa-plus"></i> Add
                            </span>
                        </div>
                    </div>
                    
                    <button style="margin-top: 20px; padding: 15px; background: #f0f0f0; border: none; border-radius: 15px; width: 100%; cursor: pointer;" onclick="editProfile()">
                        <i class="fas fa-edit"></i> Edit Profile
                    </button>
                </div>
            `;
        }

        // 显示签名编辑模式
        function showEditSignature() {
            document.getElementById('signatureDisplay').style.display = 'none';
            document.getElementById('signatureEditMode').style.display = 'block';
            document.getElementById('signatureActions').style.display = 'none';
        }

        // 取消编辑签名
        function cancelEditSignature() {
            document.getElementById('signatureDisplay').style.display = currentUser.signature ? 'block' : 'none';
            document.getElementById('signatureEditMode').style.display = 'none';
            document.getElementById('signatureActions').style.display = 'block';
        }

        // 更新编辑时的字符计数
        function updateEditSignatureCount() {
            const editInput = document.getElementById('editSignature');
            const countSpan = document.getElementById('editSignatureCount');
            if (editInput && countSpan) {
                const count = editInput.value.length;
                countSpan.textContent = `${count}/100`;
            }
        }

        // 保存签名
        function saveSignature() {
            const newSignature = document.getElementById('editSignature').value.trim();
            
            // 限制100字符
            if (newSignature.length > 100) {
                showMessage('Signature cannot exceed 100 characters', 'error');
                return;
            }
            
            // 更新 currentUser
            currentUser.signature = newSignature;
            localStorage.setItem('brookes_user', JSON.stringify(currentUser));
            
            // 更新 users 数组
            const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            const index = users.findIndex(u => u.id === currentUser.id);
            if (index !== -1) {
                users[index].signature = newSignature;
                localStorage.setItem('brookes_users', JSON.stringify(users));
            }
            
            showMessage('Signature updated successfully!', 'success');
            
            // 刷新个人资料页面
            showProfile();
        }

        function addInterest() {
            const interest = prompt('Enter your interest:');
            if (interest) {
                showMessage(`Interest "${interest}" added!`, 'success');
            }
        }

        function editProfile() {
            showMessage('Profile editing feature coming soon!', 'info');
        }

        // ==================== 导出函数 ====================
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.logout = logout;
        window.showMainPage = showMainPage;
        window.showStudents = showStudents;
        window.showSocieties = showSocieties;
        window.showMatches = showMatches;
        window.showProfile = showProfile;
        window.filterStudents = filterStudents;
        window.filterSocieties = filterSocieties;
        window.joinSociety = joinSociety;
        window.findMatches = findMatches;
        window.connectWithStudent = connectWithStudent;
        window.addInterest = addInterest;
        window.editProfile = editProfile;
        window.checkPasswordStrength = checkPasswordStrength;
        window.triggerAvatarUpload = triggerAvatarUpload;
        window.updateSignatureCount = updateSignatureCount;
        window.showEditSignature = showEditSignature;
        window.cancelEditSignature = cancelEditSignature;
        window.updateEditSignatureCount = updateEditSignatureCount;
        window.saveSignature = saveSignature;
    </script>
</body>
</html>
