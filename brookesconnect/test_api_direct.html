<!DOCTYPE html>
<html>
<head>
    <title>Direct API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { margin: 5px; padding: 10px; background: #007cba; color: white; border: none; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>直接API测试</h1>
    
    <button onclick="testEndpoint('api/matching.php?action=status')">测试主API</button>
    <button onclick="testEndpoint('emergency_fix.php?action=status')">测试紧急API</button>
    <button onclick="testEndpoint('http://localhost/BrookesConnect/api/matching.php?action=status')">测试完整URL</button>
    
    <h3>当前路径: <span id="current-path"></span></h3>
    
    <div id="result"></div>
    
    <script>
        document.getElementById('current-path').textContent = window.location.pathname;
        
        async function testEndpoint(url) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<p>测试: <code>${url}</code></p>`;
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                resultDiv.innerHTML += `<p class="success">✅ 成功 (HTTP ${response.status})</p>`;
                
                try {
                    const json = JSON.parse(text);
                    resultDiv.innerHTML += `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                } catch(e) {
                    resultDiv.innerHTML += `<pre>${text}</pre>`;
                }
                
            } catch (error) {
                resultDiv.innerHTML += `<p class="error">❌ 失败: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
