<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrookesConnect - 数据库连接版</title>
    
    <!-- 字体和图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 主容器 - 竖排滑动 */
        .scroll-container {
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding: 20px;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 登录卡片 */
        .login-card {
            background: white;
            max-width: 400px;
            margin: 50px auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 4rem;
            color: #667eea;
        }

        .logo h1 {
            font-size: 2rem;
            color: #333;
            margin-top: 10px;
        }

        /* 标签切换 */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 15px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab i {
            margin-right: 8px;
        }

        /* 表单 */
        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group label i {
            color: #667eea;
            margin-right: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #667eea;
            outline: none;
        }

        /* 按钮 */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 消息提示 */
        .message {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 5px solid #c33;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 5px solid #3c3;
        }

        .message.info {
            background: #e6f3ff;
            color: #2196F3;
            border-left: 5px solid #2196F3;
        }

        /* 主界面样式 */
        .user-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar-large {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #667eea;
        }

        .user-info h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .user-info p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .logout-btn {
            margin-top: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 15px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-good {
            background: #d4edda;
            color: #155724;
        }

        .status-bad {
            background: #f8d7da;
            color: #721c24;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .action-btn {
            background: #f8f9fa;
            border: none;
            padding: 20px 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn i {
            font-size: 1.8rem;
            color: #667eea;
        }

        .action-btn span {
            font-weight: 500;
            color: #333;
        }

        .hidden {
            display: none !important;
        }

        #initialLoading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .db-status {
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="initialLoading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 20px;">Connecting to Database...</p>
        <p id="dbStatus" style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">Initializing</p>
    </div>

    <!-- 主容器 -->
    <div class="scroll-container" id="mainContent" style="display: none;"></div>

    <script>
        // ==================== 学生相关功能 ====================

// 显示学生列表
async function showStudents() {
    const mainContent = document.getElementById('mainContent');
    
    showLoading('Loading students...');
    
    try {
        let students = [];
        
        // 从数据库获取学生数据
        if (currentWorkingAPI) {
            try {
                const response = await fetch(`${currentWorkingAPI}?action=students&_t=${Date.now()}`);
                if (response.ok) {
                    const data = await response.json();
                    students = data.data || [];
                }
            } catch (error) {
                console.log('Failed to fetch students from DB');
            }
        }
        
        // 如果数据库没有数据，使用本地存储和模拟数据
        if (students.length === 0) {
            // 从本地存储获取注册的用户
            const localUsers = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            
            // 模拟学生数据
            const mockStudents = [
                {
                    student_id: 1,
                    nickname: 'John Smith',
                    faculty: 'Business School',
                    academic_level: 'Undergraduate',
                    major: 'Business Management',
                    year_of_study: 3,
                    interests: 'Programming,Football,Music',
                    email: 'john.smith@brookes.ac.uk'
                },
                {
                    student_id: 2,
                    nickname: 'Emma Wilson',
                    faculty: 'Health Sciences',
                    academic_level: 'Postgraduate',
                    major: 'Nursing',
                    year_of_study: 1,
                    interests: 'Healthcare,Volunteering,Reading',
                    email: 'emma.wilson@brookes.ac.uk'
                },
                {
                    student_id: 3,
                    nickname: 'David Chen',
                    faculty: 'Technology',
                    academic_level: 'Undergraduate',
                    major: 'Computer Science',
                    year_of_study: 2,
                    interests: 'Coding,AI,Robotics,Gaming',
                    email: 'david.chen@brookes.ac.uk'
                },
                {
                    student_id: 4,
                    nickname: 'Sarah Ahmed',
                    faculty: 'Humanities',
                    academic_level: 'Undergraduate',
                    major: 'Psychology',
                    year_of_study: 3,
                    interests: 'Research,Counseling,Art',
                    email: 'sarah.ahmed@brookes.ac.uk'
                }
            ];
            
            // 合并本地用户和模拟数据
            students = [
                ...localUsers.map(u => ({
                    student_id: u.id,
                    nickname: u.nickname,
                    faculty: u.faculty,
                    academic_level: u.level || u.academic_level,
                    major: u.major,
                    year_of_study: u.year,
                    interests: 'New User',
                    email: u.email
                })),
                ...mockStudents
            ];
        }
        
        // 渲染学生页面
        mainContent.innerHTML = `
            <div class="card">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i class="fas fa-users" style="color: #667eea;"></i> Students Directory</h2>
                    <button class="btn-submit" style="width: auto; padding: 10px 20px;" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                </div>
                
                <!-- 搜索框 -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="studentSearch" placeholder="Search students by name, major, or faculty..." onkeyup="filterStudents()">
                    </div>
                </div>
                
                <!-- 学生列表 -->
                <div id="studentsList" style="display: flex; flex-direction: column; gap: 15px;">
                    ${renderStudentCards(students)}
                </div>
                
                <div style="text-align: center; margin-top: 20px; color: #666;">
                    <i class="fas fa-database"></i> Total: ${students.length} students
                </div>
            </div>
        `;
        
    } catch (error) {
        console.error('Error loading students:', error);
        mainContent.innerHTML = `
            <div class="card">
                <h3 style="color: #c33;">Error loading students</h3>
                <button class="btn-submit" onclick="goBack()">Go Back</button>
            </div>
        `;
    }
}

// 渲染学生卡片
function renderStudentCards(students) {
    if (students.length === 0) {
        return '<p style="text-align: center; color: #666;">No students found</p>';
    }
    
    return students.map(student => `
        <div class="student-item" style="background: #f8f9fa; border-radius: 15px; padding: 15px;">
            <div style="display: flex; gap: 15px;">
                <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between;">
                        <h4 style="margin-bottom: 5px;">${student.nickname || 'Unknown'}</h4>
                        <span style="background: #e6f0ff; color: #667eea; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem;">
                            Year ${student.year_of_study || 'N/A'}
                        </span>
                    </div>
                    <p style="color: #666; font-size: 0.9rem; margin-bottom: 5px;">
                        <i class="fas fa-building"></i> ${student.faculty || 'Not specified'}
                    </p>
                    <p style="color: #666; font-size: 0.9rem; margin-bottom: 5px;">
                        <i class="fas fa-book"></i> ${student.major || 'Undeclared'}
                    </p>
                    <div style="display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;">
                        ${(student.interests || '').split(',').slice(0, 3).map(interest => 
                            `<span style="background: white; padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; border: 1px solid #e0e0e0;">${interest.trim()}</span>`
                        ).join('')}
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

// 过滤学生
function filterStudents() {
    const searchTerm = document.getElementById('studentSearch').value.toLowerCase();
    const studentItems = document.querySelectorAll('.student-item');
    
    studentItems.forEach(item => {
        const text = item.textContent.toLowerCase();
        if (text.includes(searchTerm)) {
            item.style.display = 'block';
        } else {
            item.style.display = 'none';
        }
    });
}

// ==================== 社团相关功能 ====================

        if (societies.length === 0) {

                {

                },
                {
                    society_id: 3,
                    society_name: 'Football Club',

                },

                },

                    <button class="btn-submit" style="width: auto; padding: 10px 20px;" onclick="goBack()">

                    </button>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding: 5px;">
                    <button class="filter-btn active" onclick="filterSocieties('all')" style="padding: 8px 15px; border-radius: 20px; border: none; background: #667eea; color: white;">All</button>
                    <button class="filter-btn" onclick="filterSocieties('Academic')" style="padding: 8px 15px; border-radius: 20px; border: 1px solid #e0e0e0; background: white;">Academic</button>

                    <button class="filter-btn" onclick="filterSocieties('Arts')" style="padding: 8px 15px; border-radius: 20px; border: 1px solid #e0e0e0; background: white;">Arts</button>

                </div>
                
                <!-- 社团网格 -->
                <div id="societiesGrid" style="display: grid; grid-template-columns: 1fr; gap: 15px;">

            </div>

    } catch (error) {

// 渲染社团卡片
function renderSocietyCards(societies) {
    return societies.map(society => `
        <div class="society-card" data-category="${society.society_category || 'General'}" style="background: #f8f9fa; border-radius: 15px; padding: 20px;">
            <div style="display: flex; gap: 15px;">
                <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                    <i class="fas fa-people-group"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <h4 style="margin-bottom: 5px;">${society.society_name}</h4>
                        <span style="background: ${getCategoryColor(society.society_category)}; color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem;">
                            ${society.society_category || 'General'}
                        </span>
                    </div>
                    <p style="color: #666; font-size: 0.9rem; margin: 10px 0;">
                        ${society.description || 'No description available.'}
                    </p>
                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <span style="font-size: 0.85rem;"><i class="fas fa-users"></i> ${society.member_count || 0} members</span>
                        ${society.meeting_day ? `<span style="font-size: 0.85rem;"><i class="fas fa-calendar"></i> ${society.meeting_day}</span>` : ''}
                    </div>
                    <button class="join-btn" style="margin-top: 10px; padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer;" onclick="joinSociety(${society.society_id})">
                        <i class="fas fa-plus"></i> Join Society
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

// 获取分类颜色
function getCategoryColor(category) {
    const colors = {
        'Academic': '#2196F3',
        'Sports': '#4CAF50',
        'Arts': '#9C27B0',
        'Cultural': '#FF9800',
        'General': '#607D8B'
    };
    return colors[category] || '#607D8B';
}

// 过滤社团
function filterSocieties(category) {
    // 更新按钮样式
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.style.background = 'white';
        btn.style.color = '#333';
    });
    event.target.style.background = '#667eea';
    event.target.style.color = 'white';
    
    // 过滤卡片
    const cards = document.querySelectorAll('.society-card');
    cards.forEach(card => {
        if (category === 'all' || card.dataset.category === category) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}

// 加入社团
function joinSociety(societyId) {
    showMessage('Feature coming soon! You will be able to join societies.', 'info');
}

// ==================== 匹配相关功能 ====================

// 显示匹配页面
async function showMatches() {
    const mainContent = document.getElementById('mainContent');
    
    mainContent.innerHTML = `
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fas fa-heart" style="color: #667eea;"></i> Match Recommendations</h2>
                <button class="btn-submit" style="width: auto; padding: 10px 20px;" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
            
            <div style="text-align: center; padding: 40px 20px;">
                <i class="fas fa-handshake" style="font-size: 4rem; color: #667eea; margin-bottom: 20px;"></i>

            const loginTab = document.getElementById('loginTab');

            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            if (tab === 'login') {

                registerTab.classList.remove('active');
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');

        // 处理登录
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            showMessage('Logging in...', 'info');
            
            // 如果有数据库连接，尝试数据库登录
            if (currentWorkingAPI) {
                try {
                    const response = await fetch(`${currentWorkingAPI}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                    const data = await response.json();
                    
                    if (data.status === 'success' && data.user) {
                        localStorage.setItem('brookes_user', JSON.stringify(data.user));
                        showMessage('Login successful!', 'success');
                        setTimeout(() => showMainPage(data.user), 1000);
                        return;
                    }
                } catch (error) {
                    console.log('Database login failed, trying local');
                }
            }
            
            // 本地存储登录
            const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('brookes_user', JSON.stringify(user));
                showMessage('Login successful!', 'success');
                setTimeout(() => showMainPage(user), 1000);
            } else {
                showMessage('Invalid email or password', 'error');
            }
        }

        // 处理注册
        async function handleRegister() {
            const email = document.getElementById('regEmail').value;
            const nickname = document.getElementById('regNickname').value;
            const faculty = document.getElementById('regFaculty').value;
            const level = document.getElementById('regLevel').value;
            const major = document.getElementById('regMajor').value;
            const year = document.getElementById('regYear').value;
            const password = document.getElementById('regPassword').value;
            
            if (!email || !nickname || !faculty || !level || !major || !year || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!email.endsWith('@brookes.ac.uk')) {
                showMessage('Please use your Brookes email', 'error');
                return;
            }
            
            showMessage('Creating account...', 'info');
            
            const newUser = {
                id: Date.now(),
                email,
                nickname,
                faculty,
                level,
                major,
                year,
                password
            };
            
            // 如果有数据库连接，尝试保存到数据库
            if (currentWorkingAPI) {
                try {
                    const response = await fetch(`${currentWorkingAPI}?action=register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(newUser)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data.status === 'success') {
                            localStorage.setItem('brookes_user', JSON.stringify(data.user || newUser));
                            showMessage('Registration successful!', 'success');
                            setTimeout(() => showMainPage(data.user || newUser), 1000);
                            return;
                        }
                    }
                } catch (error) {
                    console.log('Database registration failed, saving locally');
                }
            }
            
            // 本地存储
            const users = JSON.parse(localStorage.getItem('brookes_users') || '[]');
            
            if (users.some(u => u.email === email)) {
                showMessage('Email already registered', 'error');
                return;
            }
            
            users.push(newUser);
            localStorage.setItem('brookes_users', JSON.stringify(users));
            localStorage.setItem('brookes_user', JSON.stringify(newUser));
            
            showMessage('Registration successful!', 'success');
            setTimeout(() => showMainPage(newUser), 1000);
        }

        // 登出
        function logout() {
            localStorage.removeItem('brookes_user');
            showLoginPage();
        }

        // 导出函数
        window.switchTab = switchTab;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.logout = logout;
    </script>
</body>
</html>
